name: Test & Publish Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'qa'
        type: choice
        options:
          - qa
          - staging
          - prod
      browser:
        description: 'Browser to run UI tests'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
      headless:
        description: 'Run in headless mode'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    # Run every day at 6 AM UTC
    - cron: '0 6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

# Only allow one deployment at a time to GitHub Pages
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------
      # 1. Checkout code
      # ---------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # 2. Set up JDK 21 (Gradle 9 requires JDK 21+; source/target stays at 17)
      # ---------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # ---------------------------------------------------
      # 3. Set up Chrome for UI tests
      # ---------------------------------------------------
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      # ---------------------------------------------------
      # 4. Grant execute permission to Gradle wrapper
      # ---------------------------------------------------
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ---------------------------------------------------
      # 5. Run tests
      # ---------------------------------------------------
      - name: Run tests
        continue-on-error: true
        run: |
          ./gradlew test --continue \
            -Denv=${{ github.event.inputs.environment || 'qa' }} \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=${{ github.event.inputs.headless || 'true' }}

      # ---------------------------------------------------
      # 6. Upload allure-results as artifact
      # ---------------------------------------------------
      - name: Verify allure-results exist
        if: always()
        run: |
          echo "--- build/allure-results ---"
          ls -la build/allure-results/ 2>/dev/null || echo "⚠️ allure-results directory not found"
          find build/allure-results -type f 2>/dev/null | wc -l || echo "0 files"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: build/allure-results/
          if-no-files-found: warn
          retention-days: 30

      # ---------------------------------------------------
      # 7. Upload test report (Gradle HTML) as artifact
      # ---------------------------------------------------
      - name: Upload Gradle test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-report
          path: build/reports/tests/
          retention-days: 30

  report:
    name: Generate & Publish Allure Report
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------
      # 1. Checkout repo (peaceiris/actions-gh-pages needs .git in workspace root)
      # ---------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # 2. Set up JDK (Allure CLI requires Java to run)
      # ---------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ---------------------------------------------------
      # 2. Download allure-results from test job
      # ---------------------------------------------------
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # ---------------------------------------------------
      # 3. Checkout gh-pages branch for Allure history
      # ---------------------------------------------------
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Restore Allure history
        run: |
          mkdir -p allure-results/history
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history/* allure-results/history/ || true
            echo "✅ Previous Allure history restored"
          else
            echo "⚠️ No previous history found (first run?)"
          fi

      # ---------------------------------------------------
      # 4. Install Allure CLI and generate report
      # ---------------------------------------------------
      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz | tar -xz
          echo "$PWD/allure-2.25.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        run: |
          allure generate allure-results -o allure-report --clean
          echo "✅ Allure report generated"

      - name: Verify report
        run: |
          ls -la allure-report/
          test -f allure-report/index.html || (echo "❌ index.html missing!" && exit 1)
          echo "✅ index.html found"

      # ---------------------------------------------------
      # 5. Deploy to gh-pages branch
      # ---------------------------------------------------
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          force_orphan: true

      - name: Report URL
        run: |

          echo "==========================================="
          echo "📊 Allure Report published at:"
          echo "   https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "==========================================="


