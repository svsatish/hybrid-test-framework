name: Test & Publish Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'qa'
        type: choice
        options:
          - qa
          - staging
          - prod
      browser:
        description: 'Browser to run UI tests'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
      headless:
        description: 'Run in headless mode'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  schedule:
    # Run every day at 6 AM UTC
    - cron: '0 6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time to GitHub Pages
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------
      # 1. Checkout code
      # ---------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # 2. Set up JDK 21 (Gradle 9 requires JDK 21+; source/target stays at 17)
      # ---------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # ---------------------------------------------------
      # 3. Set up Chrome for UI tests
      # ---------------------------------------------------
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      # ---------------------------------------------------
      # 4. Grant execute permission to Gradle wrapper
      # ---------------------------------------------------
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ---------------------------------------------------
      # 5. Run tests
      # ---------------------------------------------------
      - name: Run tests
        continue-on-error: true
        run: |
          ./gradlew test --continue \
            -Denv=${{ github.event.inputs.environment || 'qa' }} \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=${{ github.event.inputs.headless || 'true' }}

      # ---------------------------------------------------
      # 6. Upload allure-results as artifact
      # ---------------------------------------------------
      - name: Verify allure-results exist
        if: always()
        run: |
          echo "--- build/allure-results ---"
          ls -la build/allure-results/ 2>/dev/null || echo "⚠️ allure-results directory not found"
          find build/allure-results -type f 2>/dev/null | wc -l || echo "0 files"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: build/allure-results/
          if-no-files-found: warn
          retention-days: 30

      # ---------------------------------------------------
      # 7. Upload test report (Gradle HTML) as artifact
      # ---------------------------------------------------
      - name: Upload Gradle test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-report
          path: build/reports/tests/
          retention-days: 30

  report:
    name: Generate & Publish Allure Report
    needs: test
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ---------------------------------------------------
      # 1. Set up JDK (Allure CLI requires Java to run)
      # ---------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ---------------------------------------------------
      # 2. Download allure-results from test job
      # ---------------------------------------------------
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      # ---------------------------------------------------
      # 3. Download previous Allure history from gh-pages
      #    This enables trend charts across runs
      # ---------------------------------------------------
      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Restore Allure history
        run: |
          mkdir -p allure-results/history
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history/* allure-results/history/ || true
            echo "✅ Previous Allure history restored"
          else
            echo "⚠️ No previous history found (first run?)"
          fi

      # ---------------------------------------------------
      # 4. Install Allure CLI and generate report
      # ---------------------------------------------------
      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz | tar -xz
          echo "$PWD/allure-2.25.0/bin" >> $GITHUB_PATH

      - name: Verify allure-results
        run: |
          echo "--- workspace root ---"
          ls -la
          echo "--- allure-results ---"
          ls -la allure-results/ || echo "❌ allure-results directory missing!"
          echo "--- file count ---"
          find allure-results -type f | wc -l

      - name: Generate Allure report
        run: |
          java -version
          allure --version
          allure generate allure-results -o allure-report --clean
          echo "✅ Allure report generated"

      # Disable Jekyll — Allure uses files/dirs that Jekyll would strip
      - name: Add .nojekyll
        run: touch allure-report/.nojekyll

      - name: Verify report contents
        run: |
          echo "--- allure-report root ---"
          ls -la allure-report/
          echo "--- checking index.html ---"
          if [ ! -f "allure-report/index.html" ]; then
            echo "❌ ERROR: index.html not found in allure-report!"
            exit 1
          fi
          echo "✅ index.html found ($(wc -c < allure-report/index.html) bytes)"

      # ---------------------------------------------------
      # 5. Preserve history for next run
      # ---------------------------------------------------
      - name: Copy history to report
        run: |
          if [ -d "allure-report/history" ]; then
            echo "✅ History folder present in report"
          fi

      # ---------------------------------------------------
      # 6. Deploy to GitHub Pages
      # ---------------------------------------------------
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload report to Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report URL
        run: |
          echo "==========================================="
          echo "📊 Allure Report published at:"
          echo "   https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "==========================================="


