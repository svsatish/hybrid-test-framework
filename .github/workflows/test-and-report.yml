name: Test & Publish Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'qa'
        type: choice
        options: [ qa, staging, prod ]
      browser:
        description: 'Browser to run UI tests'
        required: false
        default: 'chrome'
        type: choice
        options: [ chrome, firefox ]
      headless:
        description: 'Run in headless mode'
        required: false
        default: 'true'
        type: choice
        options: [ 'true', 'false' ]
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  test:
    name: Run Tests & Publish Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'
          cache: 'gradle'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Verify setup
        run: |
          java -version
          ./gradlew --version

      - name: Run tests
        continue-on-error: true
        run: |
          ./gradlew test --continue \
            -Denv=${{ github.event.inputs.environment || 'qa' }} \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=${{ github.event.inputs.headless || 'true' }}

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz | tar -xz
          echo "$PWD/allure-2.25.0/bin" >> $GITHUB_PATH

      - name: Prepare Allure results
        if: always()
        run: |
          mkdir -p allure-results
          cp -r build/allure-results/* allure-results/ 2>/dev/null || echo "No test results found"
          ls -la allure-results/

      - name: Generate Allure report
        if: always()
        run: |
          allure generate allure-results -o allure-report --clean
          touch allure-report/.nojekyll

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          enable_jekyll: false
